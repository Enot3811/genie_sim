services:
  mcp-server_vl:
    profiles:
      - vl
    build:
      context: ./server
      dockerfile: mcp_vl_embedding/dockerfile
    container_name: assets-retrieval-agent_vl
    ports:
      - "8765:8765"
    env_file:
      - ../../../.env
    volumes:
      - ..:/geniesim
      - ${SIM_ASSETS}:/geniesim/assets:rw
      - ./server_chromadb_vl:/tmp/chromadb_cache_vl:rw
    command: [ "mcpo", "--config", "/geniesim/generator/server/mcp_config.json", "--port", "8765" ]
    working_dir: /geniesim
    environment:
      - SIM_ASSETS=/geniesim/assets
      - EMBEDDING_MODE=vl
      - VL_EMBEDDING_MODEL=Qwen3-VL-Embedding-2B
      - PERMANENT_MODEL_IN_GPU=False
      - USE_RERANKER=False
      - BATCH_SIZE=${VL_BATCH_SIZE:-10}
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: "nvidia"
              count: "all"
              capabilities: [ "gpu" ]
  mcp-server_text:
    profiles:
      - text
    build:
      context: ./server
      dockerfile: mcp_text_embedding/dockerfile
    container_name: assets-retrieval-agent_text
    ports:
      - "8765:8765"
    env_file:
      - ../../../.env
    environment:
      - SIM_ASSETS=/geniesim/assets
      - EMBEDDING_MODE=text
      - API_KEY=${API_KEY:-}
    volumes:
      - ..:/geniesim
      - ${SIM_ASSETS}:/geniesim/assets:rw
      - ./server_chromadb:/tmp/chromadb_cache:rw
    command: [ "mcpo", "--config", "/geniesim/generator/server/mcp_config.json", "--port", "8765" ]
    working_dir: /geniesim
    restart: unless-stopped
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    network_mode: host
    volumes:
      - ..:/geniesim
      - ./server_open-webui:/app/backend/data
    environment:
      - WEBUI_AUTH=False
      - HF_ENDPOINT=http://hf-mirror.com
    restart: always

volumes:
  open-webui:
